<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#08111f" />
  <meta name="description" content="Banda virtual local para estudo e ensaio musical." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <title>Banda de Ensaio</title>
  <style>
    :root{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#eef4ff;background:#06101d;color-scheme:dark;--panel:#0d1a2a;--panel2:#111f31;--line:#22344c;--muted:#91a3ba;--accent:#4ed8b4;--accent2:#64a7ff;--danger:#ff7388}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 15% 0%,#18304c 0,transparent 34%),linear-gradient(145deg,#06101d,#091523 60%,#07101b);color:#eef4ff}button,input{font:inherit}button{cursor:pointer}.hidden{display:none!important}
    .shell{width:min(1420px,100%);margin:auto;min-height:100vh;padding:18px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:10px 4px 24px}.brand{display:flex;align-items:center;gap:12px}.brand-mark{width:46px;height:46px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(145deg,var(--accent),#1f8bff);color:#03121a;font-size:23px;box-shadow:0 12px 35px #1fbf9c30}.brand strong{display:block;font-size:18px}.brand small,.muted{color:var(--muted)}
    .btn{border:1px solid var(--line);border-radius:12px;background:#102036;color:#eef4ff;padding:11px 15px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:700}.btn:hover{border-color:#52729d;transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,var(--accent),#30a6d7);color:#04131b;border:0}.btn.ghost{background:transparent}.btn.danger{color:#ffabb7}.icon-btn{width:42px;height:42px;padding:0;border-radius:13px}.hero{display:grid;grid-template-columns:1.35fr .65fr;gap:20px;padding:32px;border:1px solid #29405e;border-radius:24px;background:linear-gradient(135deg,#12253bdf,#0a1727e8);box-shadow:0 24px 70px #0006}.eyebrow{color:var(--accent);font-size:11px;font-weight:900;letter-spacing:.16em}.hero h1{max-width:750px;margin:10px 0 12px;font-size:clamp(30px,5vw,62px);line-height:1.02}.hero p{max-width:720px;color:#adbed3;font-size:17px;line-height:1.6}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}.visual{min-height:240px;display:flex;align-items:center;justify-content:center;gap:8px;padding:24px}.visual span{width:10px;min-height:20px;border-radius:20px;background:linear-gradient(to top,#2b8cff,var(--accent));animation:pulse 1.2s ease-in-out infinite alternate;box-shadow:0 0 22px #4ed8b450}@keyframes pulse{to{transform:scaleY(.45);opacity:.55}}
    .section-head{display:flex;justify-content:space-between;align-items:end;margin:30px 4px 15px}.section-head h2{margin:5px 0 0}.empty{border:1px dashed #344b69;border-radius:20px;padding:50px 20px;text-align:center;color:var(--muted);background:#0b1726a8}.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}.card{position:relative;border:1px solid var(--line);border-radius:18px;padding:16px;background:linear-gradient(145deg,#101f32,#0b1726);display:grid;grid-template-columns:60px 1fr auto;gap:13px;align-items:center}.cover{width:60px;height:60px;border:0;border-radius:17px;background:linear-gradient(145deg,#2e6a9f,#32c6a1);font-size:25px;color:white}.card strong{display:block;margin-bottom:5px}.card small{display:block;color:var(--muted);line-height:1.5}
    .studio-head{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;margin-bottom:15px}.song-title strong{display:block;font-size:20px}.song-title small{color:var(--muted)}.grid{display:grid;grid-template-columns:minmax(0,1.55fr) minmax(310px,.75fr);gap:14px}.panel{border:1px solid var(--line);border-radius:18px;background:linear-gradient(145deg,#0f1d2e,#0a1624);box-shadow:0 16px 40px #0003}.timeline{padding:16px}.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:13px;font-weight:800}.panel-head small{color:var(--muted);font-weight:500}.sections{display:flex;gap:7px;overflow:auto;padding-bottom:10px}.sections button,.pill{white-space:nowrap;border:1px solid var(--line);background:#13253a;color:#dce8f8;border-radius:999px;padding:8px 12px}.wave{height:190px;position:relative;display:flex;align-items:center;gap:3px;padding:15px 8px;border-radius:15px;overflow:hidden;background:#07111d;cursor:pointer}.wave .bar{flex:1;min-width:2px;border-radius:5px;background:linear-gradient(to top,#245b96,#4ed8b4);opacity:.72}.playhead{position:absolute;top:0;bottom:0;width:2px;background:white;box-shadow:0 0 12px white;pointer-events:none}.loop-area{position:absolute;top:0;bottom:0;background:#4ed8b423;border-left:1px solid var(--accent);border-right:1px solid var(--accent);pointer-events:none}.time-row{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:7px}.loop-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.pill.active{background:#173f42;border-color:var(--accent);color:#9ff7df}.mixer{padding:16px;grid-row:span 2}.track-list{display:grid;gap:9px;max-height:590px;overflow:auto}.track{border:1px solid #263b55;border-radius:14px;padding:11px;background:#0b1828}.track.selected{border-color:var(--accent);box-shadow:0 0 0 1px #4ed8b440}.track-top{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:7px}.track-name{border:0;background:transparent;color:#fff;text-align:left;padding:3px;font-weight:800}.mini{width:34px;height:30px;border:1px solid #314963;border-radius:9px;background:#14263a;color:#c8d7e9;font-weight:900}.mini.on{background:#4ed8b4;color:#05161b;border-color:#4ed8b4}.track input{width:100%;accent-color:var(--accent);margin-top:9px}.mode-panel,.transport{padding:16px}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.mode{border:1px solid var(--line);background:#102036;color:white;border-radius:14px;padding:14px 9px;text-align:left}.mode strong,.mode small{display:block}.mode small{color:var(--muted);margin-top:4px}.mode.active{border-color:var(--accent);background:#12363a}.speed{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;margin-top:15px}.speed input{accent-color:var(--accent)}.transport{grid-column:1/-1;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:15px}.transport-time strong{font-size:27px}.transport-time span{display:block;color:var(--muted)}.transport-buttons{display:flex;align-items:center;gap:9px}.play{width:62px;height:62px;border:0;border-radius:50%;background:linear-gradient(135deg,var(--accent),#43a7ff);color:#04131b;font-size:24px}.notice{text-align:right;color:var(--muted);font-size:12px}.toast{position:fixed;right:18px;bottom:18px;max-width:420px;padding:14px 16px;border:1px solid #426182;border-radius:14px;background:#102238;box-shadow:0 15px 45px #0008;z-index:99}.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:7px}
    @media(max-width:900px){.hero{grid-template-columns:1fr}.visual{display:none}.grid{grid-template-columns:1fr}.mixer{grid-row:auto}.transport{grid-template-columns:1fr}.notice{text-align:left}.transport-buttons{justify-content:center}.shell{padding:10px}.hero{padding:24px 18px}.modes{grid-template-columns:1fr}}
    @media(orientation:landscape) and (max-height:560px){.hero{padding:18px}.hero h1{font-size:34px}.visual{min-height:140px}.wave{height:130px}.track-list{max-height:275px}}
  </style>
</head>
<body>
  <div id="app"></div>
  <input id="fileInput" class="hidden" type="file" accept="audio/*" multiple />
  <script>
    (() => {
      const app = document.getElementById('app');
      const fileInput = document.getElementById('fileInput');
      const roles = {vocals:'Voz',drums:'Bateria',bass:'Baixo',guitar:'Violão/Guitarra',keys:'Teclado',other:'Outros'};
      let projects = [];
      let active = null;
      let raf = 0;
      let playing = false;
      let mode = 'normal';
      let rate = 1;

      const esc = value => String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
      const id = prefix => prefix + '-' + Date.now() + '-' + Math.random().toString(36).slice(2,8);
      const fmt = seconds => { const n=Math.max(0,Number(seconds)||0),m=Math.floor(n/60),s=Math.floor(n%60); return m+':'+String(s).padStart(2,'0'); };
      const titleFrom = name => name.replace(/\.[^/.]+$/,'').replace(/[_-]+/g,' ').trim() || 'Nova música';
      function classify(name,index){const n=name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');if(/vocal|voz|voice/.test(n))return'vocals';if(/drum|bateria|perc/.test(n))return'drums';if(/bass|baixo/.test(n))return'bass';if(/guitar|guitarra|violao|acoustic/.test(n))return'guitar';if(/piano|keys|teclado|organ|synth/.test(n))return'keys';return index===0?'other':'other'}
      function toast(message){const old=document.querySelector('.toast');if(old)old.remove();const el=document.createElement('div');el.className='toast';el.innerHTML='<span class="status-dot"></span>'+esc(message);document.body.appendChild(el);setTimeout(()=>el.remove(),4200)}
      function makeBars(){return Array.from({length:100},(_,i)=>18+Math.abs(Math.sin(i*.34)*58)+Math.abs(Math.sin(i*.09+1)*22));}

      function renderLibrary(){stopAll();active=null;app.innerHTML=`<main class="shell"><header class="topbar"><div class="brand"><span class="brand-mark">♫</span><div><strong>Banda de Ensaio</strong><small>Seu estúdio pessoal e privado</small></div></div><button class="btn primary" id="addTop">＋ Adicionar música</button></header><section class="hero"><div><span class="eyebrow">PRIMEIRA VERSÃO FUNCIONAL</span><h1>Aprenda uma parte. Depois toque com a banda.</h1><p>Importe uma música ou stems já separados, destaque o instrumento que deseja estudar, silencie-o para tocar com a banda e repita trechos difíceis.</p><div class="actions"><button class="btn primary" id="addHero">🎵 Importar arquivos</button><button class="btn" id="demo">✨ Abrir demonstração</button></div></div><div class="visual">${[78,42,92,60,88,34,72,54,96,50,82,38,68,90,48,74].map((h,i)=>`<span style="height:${h}%;animation-delay:${i*60}ms"></span>`).join('')}</div></section><div class="section-head"><div><span class="eyebrow">BIBLIOTECA</span><h2>Seus ensaios</h2></div><span class="muted">${projects.length} projeto${projects.length===1?'':'s'}</span></div>${projects.length?`<section class="cards">${projects.map(p=>`<article class="card"><button class="cover" data-open="${p.id}">▶</button><div><strong>${esc(p.title)}</strong><small>${p.tracks.length} faixa${p.tracks.length===1?'':'s'} · ${fmt(p.duration)}</small><small>${p.demo?'Demonstração local':'Arquivos do aparelho'}</small></div><button class="btn ghost danger icon-btn" data-delete="${p.id}" aria-label="Excluir">×</button></article>`).join('')}</section>`:`<div class="empty"><div style="font-size:34px">♫</div><strong>Nenhuma música adicionada</strong><p>Abra a demonstração ou importe arquivos de áudio do seu aparelho.</p></div>`}</main>`;
        document.getElementById('addTop').onclick=()=>fileInput.click();document.getElementById('addHero').onclick=()=>fileInput.click();document.getElementById('demo').onclick=createDemo;
        document.querySelectorAll('[data-open]').forEach(b=>b.onclick=()=>openProject(b.dataset.open));document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=()=>{projects=projects.filter(p=>p.id!==b.dataset.delete);renderLibrary()});
      }

      async function importFiles(files){const list=Array.from(files);if(!list.length)return;const tracks=list.map((file,index)=>({id:id('track'),role:classify(file.name,index),name:roles[classify(file.name,index)]||titleFrom(file.name),file,url:URL.createObjectURL(file),volume:.85,muted:false,solo:false,audio:null}));let duration=0;try{duration=await readDuration(tracks[0].url)}catch{}const project={id:id('song'),title:titleFrom(list[0].name),tracks,duration:duration||240,studyTrackId:(tracks.find(t=>t.role==='keys'||t.role==='guitar')||tracks[0]).id,loop:{enabled:false,start:0,end:Math.min(duration||240,12)},bars:makeBars(),demo:false};projects.unshift(project);openProject(project.id);toast('Arquivos carregados somente neste aparelho.');fileInput.value=''}
      function readDuration(url){return new Promise((resolve,reject)=>{const a=new Audio();a.preload='metadata';a.onloadedmetadata=()=>resolve(Number.isFinite(a.duration)?a.duration:0);a.onerror=reject;a.src=url})}

      function encodeWav(samples,sampleRate){const buffer=new ArrayBuffer(44+samples.length*2),view=new DataView(buffer);const text=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i))};text(0,'RIFF');view.setUint32(4,36+samples.length*2,true);text(8,'WAVE');text(12,'fmt ');view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);view.setUint32(24,sampleRate,true);view.setUint32(28,sampleRate*2,true);view.setUint16(32,2,true);view.setUint16(34,16,true);text(36,'data');view.setUint32(40,samples.length*2,true);for(let i=0;i<samples.length;i++){const s=Math.max(-1,Math.min(1,samples[i]));view.setInt16(44+i*2,s<0?s*32768:s*32767,true)}return new Blob([buffer],{type:'audio/wav'})}
      function synth(role,index){const sr=22050,dur=24,len=sr*dur,s=new Float32Array(len),freqs=[196,98,65.4,293.7,392,523.3],f=freqs[index%freqs.length];for(let i=0;i<len;i++){const t=i/sr,beat=t%(60/76),env=Math.exp(-beat*5);let v=0;if(role==='drums')v=(Math.random()*2-1)*env*.35;else if(role==='bass')v=Math.sin(2*Math.PI*f*t)*(.24+.12*env);else if(role==='vocals')v=(Math.sin(2*Math.PI*f*t)+.35*Math.sin(2*Math.PI*f*2*t))*.12*(.65+.35*Math.sin(t*1.2));else if(role==='keys')v=(Math.sin(2*Math.PI*f*t)+.45*Math.sin(2*Math.PI*f*1.5*t))*.12;else v=Math.sin(2*Math.PI*f*t)*.13*env;s[i]=v}return encodeWav(s,sr)}
      function createDemo(){const list=[['vocals','Voz'],['drums','Bateria'],['bass','Baixo'],['guitar','Violão'],['keys','Teclado'],['other','Pad']];const tracks=list.map(([role,name],i)=>{const file=synth(role,i),url=URL.createObjectURL(file);return{id:id('track'),role,name,file,url,volume:.82,muted:false,solo:false,audio:null}});const p={id:id('demo'),title:'Ensaio de demonstração',tracks,duration:24,studyTrackId:tracks[4].id,loop:{enabled:true,start:6,end:12},bars:makeBars(),demo:true};projects.unshift(p);openProject(p.id);toast('Demonstração criada localmente, sem música protegida.')}

      function openProject(projectId){active=projects.find(p=>p.id===projectId);if(!active)return;playing=false;mode='normal';rate=1;active.tracks.forEach(t=>{if(!t.audio){t.audio=new Audio(t.url);t.audio.preload='auto';t.audio.preservesPitch=true}});renderStudio();applyMix()}
      function renderStudio(){const p=active,sections=[['Introdução',0],['Verso',.25],['Refrão',.5],['Ponte',.75]];app.innerHTML=`<main class="shell"><header class="studio-head"><button class="btn ghost icon-btn" id="back">←</button><div class="song-title"><strong>${esc(p.title)}</strong><small>Projeto local · ${p.tracks.length} faixas · IA de separação entra na próxima etapa</small></div><button class="btn" id="save">✓ Salvo localmente</button></header><section class="grid"><div class="panel timeline"><div class="panel-head"><span>♫ Estrutura e forma de onda</span><span id="timeLabel">0:00 / ${fmt(p.duration)}</span></div><div class="sections">${sections.map(([n,pos])=>`<button data-seek="${p.duration*pos}">${n}</button>`).join('')}</div><div class="wave" id="wave"><div class="loop-area" id="loopArea"></div>${p.bars.map(h=>`<span class="bar" style="height:${h}%"></span>`).join('')}<div class="playhead" id="playhead"></div></div><div class="time-row"><span>0:00</span><span>${fmt(p.duration)}</span></div><div class="loop-tools"><button class="pill ${p.loop.enabled?'active':''}" id="loopToggle">↻ Loop ${p.loop.enabled?'ligado':'desligado'}</button><button class="pill" id="setA">A · ${fmt(p.loop.start)}</button><button class="pill" id="setB">B · ${fmt(p.loop.end)}</button></div></div><aside class="panel mixer"><div class="panel-head"><span>☷ Mixer</span><small>Toque no nome para estudar</small></div><div class="track-list">${p.tracks.map(t=>`<div class="track ${t.id===p.studyTrackId?'selected':''}" data-track="${t.id}"><div class="track-top"><button class="track-name" data-study="${t.id}">${esc(t.name)}</button><button class="mini ${t.solo?'on':''}" data-solo="${t.id}">S</button><button class="mini ${t.muted?'on':''}" data-mute="${t.id}">M</button></div><input data-volume="${t.id}" type="range" min="0" max="1" step="0.01" value="${t.volume}" /></div>`).join('')}</div></aside><section class="panel mode-panel"><div class="panel-head"><span>▤ Modo de ensaio</span></div><div class="modes"><button class="mode ${mode==='learn'?'active':''}" data-mode="learn"><strong>Aprender</strong><small>Destacar instrumento</small></button><button class="mode ${mode==='band'?'active':''}" data-mode="band"><strong>Tocar com a banda</strong><small>Remover instrumento</small></button><button class="mode ${mode==='normal'?'active':''}" data-mode="normal"><strong>Mixagem livre</strong><small>Controle manual</small></button></div><p class="muted" id="modeText">Mixagem livre, sem ajuste automático.</p><div class="speed"><span>Velocidade</span><input id="rate" type="range" min="0.5" max="1.2" step="0.05" value="${rate}"/><strong id="rateLabel">${Math.round(rate*100)}%</strong></div></section><section class="panel transport"><div class="transport-time"><strong id="bigTime">0:00</strong><span>${fmt(p.duration)}</span></div><div class="transport-buttons"><button class="btn ghost icon-btn" id="start">|◀</button><button class="btn ghost" id="minus">−5s</button><button class="play" id="play">▶</button><button class="btn ghost" id="plus">+5s</button><button class="btn ghost icon-btn" id="end">▶|</button></div><div class="notice">Os arquivos permanecem no navegador. Não são enviados para servidor.</div></section></section></main>`;
        bindStudio();updateVisuals(0)
      }
      function bindStudio(){const p=active;document.getElementById('back').onclick=renderLibrary;document.getElementById('save').onclick=()=>toast('Projeto mantido durante esta sessão. Persistência completa será conectada ao IndexedDB.');document.querySelectorAll('[data-seek]').forEach(b=>b.onclick=()=>seek(+b.dataset.seek));document.getElementById('wave').onclick=e=>{const r=e.currentTarget.getBoundingClientRect();seek(((e.clientX-r.left)/r.width)*p.duration)};document.getElementById('loopToggle').onclick=()=>{p.loop.enabled=!p.loop.enabled;renderStudio();applyMix()};document.getElementById('setA').onclick=()=>{p.loop.start=Math.min(currentTime(),Math.max(0,p.loop.end-.5));p.loop.enabled=true;renderStudio()};document.getElementById('setB').onclick=()=>{p.loop.end=Math.max(currentTime(),Math.min(p.duration,p.loop.start+.5));p.loop.enabled=true;renderStudio()};document.querySelectorAll('[data-study]').forEach(b=>b.onclick=()=>{p.studyTrackId=b.dataset.study;renderStudio();applyMix()});document.querySelectorAll('[data-solo]').forEach(b=>b.onclick=()=>{const t=p.tracks.find(x=>x.id===b.dataset.solo);t.solo=!t.solo;renderStudio();applyMix()});document.querySelectorAll('[data-mute]').forEach(b=>b.onclick=()=>{const t=p.tracks.find(x=>x.id===b.dataset.mute);t.muted=!t.muted;renderStudio();applyMix()});document.querySelectorAll('[data-volume]').forEach(i=>i.oninput=()=>{const t=p.tracks.find(x=>x.id===i.dataset.volume);t.volume=+i.value;applyMix()});document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;renderStudio();applyMix()});document.getElementById('rate').oninput=e=>{rate=+e.target.value;p.tracks.forEach(t=>t.audio.playbackRate=rate);document.getElementById('rateLabel').textContent=Math.round(rate*100)+'%'};document.getElementById('play').onclick=toggle;document.getElementById('minus').onclick=()=>seek(currentTime()-5);document.getElementById('plus').onclick=()=>seek(currentTime()+5);document.getElementById('start').onclick=()=>seek(0);document.getElementById('end').onclick=()=>seek(p.duration)}
      function applyMix(){if(!active)return;const solo=active.tracks.some(t=>t.solo);active.tracks.forEach(t=>{let v=(solo?t.solo:!t.muted)?t.volume:0;if(mode==='learn'&&active.studyTrackId)v*=t.id===active.studyTrackId?1:.22;if(mode==='band'&&t.id===active.studyTrackId)v=0;t.audio.volume=Math.max(0,Math.min(1,v));t.audio.playbackRate=rate})}
      function currentTime(){const a=active&&active.tracks[0]&&active.tracks[0].audio;return a?a.currentTime:0}
      async function toggle(){if(!active)return;if(playing){active.tracks.forEach(t=>t.audio.pause());playing=false;cancelAnimationFrame(raf);document.getElementById('play').textContent='▶';return}let start=currentTime();if(active.loop.enabled&&(start<active.loop.start||start>=active.loop.end))start=active.loop.start;active.tracks.forEach(t=>{t.audio.currentTime=start});await Promise.allSettled(active.tracks.map(t=>t.audio.play()));playing=true;document.getElementById('play').textContent='Ⅱ';tick()}
      function tick(){if(!playing||!active)return;let t=currentTime();if(active.loop.enabled&&active.loop.end>active.loop.start&&t>=active.loop.end){t=active.loop.start;active.tracks.forEach(x=>x.audio.currentTime=t)}active.tracks.forEach(x=>{if(Math.abs(x.audio.currentTime-t)>.14)x.audio.currentTime=t});updateVisuals(t);if(t>=active.duration-.05){playing=false;document.getElementById('play').textContent='▶';return}raf=requestAnimationFrame(tick)}
      function seek(value){if(!active)return;const t=Math.max(0,Math.min(active.duration,value));active.tracks.forEach(x=>x.audio.currentTime=t);updateVisuals(t)}
      function updateVisuals(t){if(!active)return;const pct=active.duration?(t/active.duration)*100:0;const ph=document.getElementById('playhead'),label=document.getElementById('timeLabel'),big=document.getElementById('bigTime'),la=document.getElementById('loopArea');if(ph)ph.style.left=pct+'%';if(label)label.textContent=fmt(t)+' / '+fmt(active.duration);if(big)big.textContent=fmt(t);if(la){la.style.display=active.loop.enabled?'block':'none';la.style.left=(active.loop.start/active.duration*100)+'%';la.style.width=((active.loop.end-active.loop.start)/active.duration*100)+'%'}const mt=document.getElementById('modeText');if(mt)mt.textContent=mode==='learn'?'Instrumento selecionado em destaque e banda reduzida.':mode==='band'?'Instrumento selecionado silenciado para você tocar.':'Mixagem livre, sem ajuste automático.'}
      function stopAll(){cancelAnimationFrame(raf);playing=false;if(active)active.tracks.forEach(t=>t.audio&&t.audio.pause())}
      fileInput.addEventListener('change',e=>importFiles(e.target.files));window.addEventListener('beforeunload',stopAll);window.addEventListener('error',e=>toast('Erro detectado: '+(e.message||'falha ao carregar')));
      renderLibrary();
      if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
    })();
  </script>
</body>
</html>
